<!-- =====================================================
     FUELFLOW ADMIN SIDEBAR PARTIAL
     Usage: {% include 'admin_panel/partials/sidebar.html' with active='dashboard' %}
     active values: dashboard | orders | customers | drivers | reports | settings
     ===================================================== -->
<aside class="sidebar" id="sidebar">

  <a href="{% url 'admin_dashboard' %}" class="sidebar-brand">
    <div class="sb-logo"><i class="fas fa-gas-pump"></i></div>
    <span class="sb-title">Fuel<span>Flow</span></span>
  </a>

  <div class="sidebar-admin">
    <div class="sa-avatar">{{ request.user.first_name.0|default:"A" }}{{ request.user.last_name.0|default:"D" }}</div>
    <div class="sa-info">
      <div class="sa-name">{{ request.user.get_full_name|default:"System Admin" }}</div>
      <div class="sa-role"><i class="fas fa-shield-halved" style="font-size:0.6rem;margin-right:4px"></i>Administrator</div>
    </div>
  </div>

  <nav class="sidebar-nav">

    <span class="nav-section-label">Overview</span>
    <a href="{% url 'admin_dashboard' %}" class="nav-item {% if active == 'dashboard' %}active{% endif %}">
      <i class="fas fa-gauge-high"></i><span>Dashboard</span>
    </a>

    <span class="nav-section-label">Management</span>
    <a href="{% url 'admin_orders' %}" class="nav-item {% if active == 'orders' %}active{% endif %}">
      <i class="fas fa-box-open"></i><span>Orders</span>
      <span class="nav-badge" id="pendingOrdersBadge">{{ pending_orders_count|default:"5" }}</span>
    </a>
    <a href="{% url 'admin_customers' %}" class="nav-item {% if active == 'customers' %}active{% endif %}">
      <i class="fas fa-users"></i><span>Customers</span>
    </a>
    <a href="{% url 'admin_drivers' %}" class="nav-item {% if active == 'drivers' %}active{% endif %}">
      <i class="fas fa-truck-fast"></i><span>Drivers</span>
    </a>

    <span class="nav-section-label">Insights</span>
    <a href="{% url 'admin_reports' %}" class="nav-item {% if active == 'reports' %}active{% endif %}">
      <i class="fas fa-chart-bar"></i><span>Reports</span>
    </a>
    <a href="{% url 'admin_settings' %}" class="nav-item {% if active == 'settings' %}active{% endif %}">
      <i class="fas fa-gear"></i><span>Settings</span>
    </a>

  </nav>

  <div class="sidebar-footer">
    <a href="{% url 'logout' %}" class="nav-item logout">
      <i class="fas fa-sign-out-alt"></i><span>Log Out</span>
    </a>
  </div>

</aside>
