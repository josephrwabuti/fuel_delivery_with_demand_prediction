<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <linearGradient id="truck2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e85d04"/>
      <stop offset="100%" stop-color="#c44e02"/>
    </linearGradient>
    <linearGradient id="tank2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d5166"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4a926" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f4a926" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="560" fill="url(#bg)"/>
  <!-- Sun/glow at horizon -->
  <ellipse cx="400" cy="280" rx="250" ry="250" fill="url(#sunGlow)"/>
  <!-- Highway road -->
  <path d="M0 380 Q400 340 800 380 L800 560 L0 560 Z" fill="#111"/>
  <!-- Road lines -->
  <path d="M80 420 Q400 395 720 420" stroke="white" stroke-width="3" stroke-dasharray="60,30" fill="none" opacity="0.2"/>
  <!-- Landscape hills -->
  <ellipse cx="150" cy="340" rx="220" ry="80" fill="#0f1e2e"/>
  <ellipse cx="650" cy="330" rx="250" ry="90" fill="#0f1e2e"/>
  <!-- Sky details -->
  <circle cx="120" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="300" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="500" cy="90" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="680" cy="60" r="0.8" fill="white" opacity="0.4"/>
  <!-- DELIVERY WORKER on left -->
  <!-- Body -->
  <rect x="100" y="190" width="50" height="110" rx="8" fill="#e85d04"/>
  <!-- Hard hat -->
  <ellipse cx="125" cy="185" rx="28" ry="12" fill="#f4a926"/>
  <rect x="100" y="178" width="50" height="10" rx="5" fill="#f4a926"/>
  <!-- Head -->
  <circle cx="125" cy="165" r="22" fill="#d4956a"/>
  <!-- Face -->
  <circle cx="118" cy="160" r="3" fill="#5a3a2a"/>
  <circle cx="132" cy="160" r="3" fill="#5a3a2a"/>
  <path d="M116 172 Q125 178 134 172" stroke="#5a3a2a" stroke-width="2" fill="none"/>
  <!-- Arms -->
  <rect x="68" y="200" width="35" height="14" rx="6" fill="#e85d04"/>
  <rect x="147" y="200" width="35" height="14" rx="6" fill="#e85d04"/>
  <!-- Clipboard in hand -->
  <rect x="68" y="206" width="28" height="36" rx="3" fill="#fff" opacity="0.9"/>
  <rect x="72" y="215" width="18" height="2" rx="1" fill="#0d1b2a" opacity="0.4"/>
  <rect x="72" y="221" width="14" height="2" rx="1" fill="#0d1b2a" opacity="0.4"/>
  <rect x="72" y="227" width="16" height="2" rx="1" fill="#0d1b2a" opacity="0.4"/>
  <!-- Legs -->
  <rect x="105" y="298" width="18" height="55" rx="6" fill="#1a2a3a"/>
  <rect x="128" y="298" width="18" height="55" rx="6" fill="#1a2a3a"/>
  <!-- Boots -->
  <rect x="100" y="345" width="25" height="14" rx="4" fill="#111"/>
  <rect x="123" y="345" width="25" height="14" rx="4" fill="#111"/>
  <!-- Vest stripe -->
  <rect x="100" y="230" width="50" height="5" fill="#f4a926" opacity="0.7"/>
  <!-- FUEL PUMP / STATION -->
  <rect x="300" y="160" width="80" height="200" rx="8" fill="#1e3a52"/>
  <rect x="300" y="160" width="80" height="40" rx="8" fill="#2c5270"/>
  <text x="340" y="185" font-family="Arial, sans-serif" font-size="11" fill="#f4a926" text-anchor="middle" font-weight="bold">FUEL</text>
  <!-- Pump screen -->
  <rect x="312" y="210" width="56" height="40" rx="4" fill="#0a1520"/>
  <text x="340" y="228" font-family="Arial, sans-serif" font-size="9" fill="#4cd164" text-anchor="middle">PRICE/L</text>
  <text x="340" y="243" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">$1.42</text>
  <!-- Pump nozzle -->
  <rect x="374" y="260" width="12" height="50" rx="4" fill="#e85d04"/>
  <path d="M380 260 Q410 250 415 290" stroke="#e85d04" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Pump base -->
  <rect x="295" y="355" width="90" height="12" rx="4" fill="#0d1b2a"/>
  <!-- TANKER TRUCK (side view) -->
  <!-- Cab -->
  <rect x="440" y="255" width="130" height="100" rx="10" fill="url(#truck2)"/>
  <rect x="450" y="263" width="90" height="58" rx="6" fill="#0d1b2a" opacity="0.8"/>
  <line x1="495" y1="263" x2="495" y2="321" stroke="#050d14" stroke-width="2"/>
  <rect x="450" y="325" width="120" height="6" fill="#c44e02"/>
  <rect x="560" y="270" width="8" height="8" rx="2" fill="#f4a926" opacity="0.9"/>
  <!-- Mirror -->
  <rect x="430" y="268" width="12" height="18" rx="3" fill="#b84402"/>
  <!-- Tanker body -->
  <ellipse cx="650" cy="300" rx="190" ry="50" fill="url(#tank2)"/>
  <ellipse cx="460" cy="300" rx="12" ry="50" fill="#253545"/>
  <ellipse cx="840" cy="300" rx="12" ry="50" fill="#253545"/>
  <!-- Tanker shine -->
  <ellipse cx="650" cy="270" rx="150" ry="14" fill="white" opacity="0.07"/>
  <!-- Tanker rings -->
  <rect x="550" y="250" width="5" height="100" fill="#1a2a3a" opacity="0.6"/>
  <rect x="640" y="250" width="5" height="100" fill="#1a2a3a" opacity="0.6"/>
  <rect x="730" y="250" width="5" height="100" fill="#1a2a3a" opacity="0.6"/>
  <!-- Text on tanker -->
  <text x="620" y="308" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="white" opacity="0.8" letter-spacing="2">FUELFLOW</text>
  <!-- Wheels -->
  <circle cx="510" cy="360" r="30" fill="#1a1a1a"/>
  <circle cx="510" cy="360" r="20" fill="#2a2a2a"/>
  <circle cx="510" cy="360" r="7" fill="#555"/>
  <circle cx="660" cy="360" r="30" fill="#1a1a1a"/>
  <circle cx="660" cy="360" r="20" fill="#2a2a2a"/>
  <circle cx="660" cy="360" r="7" fill="#555"/>
  <circle cx="780" cy="360" r="30" fill="#1a1a1a"/>
  <circle cx="780" cy="360" r="20" fill="#2a2a2a"/>
  <circle cx="780" cy="360" r="7" fill="#555"/>
  <!-- Phone with app - bottom left card -->
  <rect x="30" y="390" width="120" height="150" rx="14" fill="#0d1b2a" stroke="#e85d04" stroke-width="2"/>
  <rect x="38" y="405" width="104" height="120" rx="6" fill="#1a2a3a"/>
  <!-- App screen content -->
  <text x="90" y="425" font-family="Arial, sans-serif" font-size="8" fill="#e85d04" text-anchor="middle" font-weight="bold">FUELFLOW APP</text>
  <rect x="45" y="432" width="90" height="16" rx="4" fill="#e85d04" opacity="0.15"/>
  <text x="90" y="443" font-family="Arial, sans-serif" font-size="7" fill="#4cd164" text-anchor="middle">● EN ROUTE – 8 min</text>
  <rect x="45" y="453" width="60" height="5" rx="2" fill="#e85d04" opacity="0.5"/>
  <rect x="45" y="463" width="45" height="5" rx="2" fill="#e85d04" opacity="0.3"/>
  <rect x="45" y="473" width="55" height="5" rx="2" fill="#e85d04" opacity="0.4"/>
  <rect x="45" y="488" width="90" height="26" rx="6" fill="#e85d04"/>
  <text x="90" y="505" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">TRACK ORDER</text>
  <!-- Orange glow effect -->
  <ellipse cx="650" cy="400" rx="300" ry="30" fill="#e85d04" opacity="0.08"/>
</svg>
