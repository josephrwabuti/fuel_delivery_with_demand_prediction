<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="60%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="truckBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c44e02"/>
      <stop offset="100%" stop-color="#e85d04"/>
    </linearGradient>
    <linearGradient id="tanker" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="50%" stop-color="#3d5166"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="headlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f4a926" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky background -->
  <rect width="1400" height="800" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="250" cy="40" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="400" cy="100" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="600" cy="60" r="1" fill="white" opacity="0.8"/>
  <circle cx="800" cy="30" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="1000" cy="90" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="1150" cy="50" r="1.4" fill="white" opacity="0.5"/>
  <circle cx="1300" cy="110" r="1" fill="white" opacity="0.6"/>
  <circle cx="180" cy="160" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="500" cy="140" r="1.1" fill="white" opacity="0.6"/>
  <circle cx="720" cy="170" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="950" cy="150" r="1.3" fill="white" opacity="0.5"/>
  <circle cx="1200" cy="180" r="0.6" fill="white" opacity="0.4"/>
  <!-- Distant city skyline -->
  <rect x="0" y="420" width="80" height="180" fill="#0f1e2e" opacity="0.8"/>
  <rect x="60" y="380" width="60" height="220" fill="#0f1e2e" opacity="0.8"/>
  <rect x="110" y="410" width="50" height="190" fill="#0f1e2e" opacity="0.8"/>
  <rect x="180" y="360" width="70" height="240" fill="#122030" opacity="0.8"/>
  <rect x="240" y="400" width="40" height="200" fill="#0f1e2e" opacity="0.8"/>
  <rect x="1000" y="390" width="70" height="210" fill="#0f1e2e" opacity="0.8"/>
  <rect x="1060" y="350" width="55" height="250" fill="#122030" opacity="0.8"/>
  <rect x="1110" y="410" width="80" height="190" fill="#0f1e2e" opacity="0.8"/>
  <rect x="1200" y="370" width="65" height="230" fill="#122030" opacity="0.8"/>
  <rect x="1280" y="400" width="120" height="200" fill="#0f1e2e" opacity="0.8"/>
  <!-- Building windows -->
  <rect x="70" y="395" width="8" height="8" fill="#f4a926" opacity="0.6"/>
  <rect x="85" y="395" width="8" height="8" fill="#f4a926" opacity="0.3"/>
  <rect x="70" y="415" width="8" height="8" fill="#f4a926" opacity="0.5"/>
  <rect x="190" y="380" width="8" height="8" fill="#f4a926" opacity="0.4"/>
  <rect x="205" y="380" width="8" height="8" fill="#f4a926" opacity="0.6"/>
  <rect x="190" y="400" width="8" height="8" fill="#f4a926" opacity="0.3"/>
  <rect x="1070" y="370" width="8" height="8" fill="#f4a926" opacity="0.5"/>
  <rect x="1085" y="370" width="8" height="8" fill="#f4a926" opacity="0.4"/>
  <rect x="1210" y="390" width="8" height="8" fill="#f4a926" opacity="0.6"/>
  <rect x="1225" y="390" width="8" height="8" fill="#f4a926" opacity="0.3"/>
  <!-- Road -->
  <rect x="0" y="580" width="1400" height="220" fill="url(#road)"/>
  <!-- Road markings -->
  <rect x="0" y="618" width="1400" height="3" fill="#f4a926" opacity="0.3"/>
  <rect x="0" y="680" width="1400" height="3" fill="white" opacity="0.15"/>
  <!-- Dashed center line -->
  <rect x="0" y="648" width="120" height="4" fill="white" opacity="0.2" rx="2"/>
  <rect x="160" y="648" width="120" height="4" fill="white" opacity="0.2" rx="2"/>
  <rect x="320" y="648" width="120" height="4" fill="white" opacity="0.2" rx="2"/>
  <rect x="480" y="648" width="120" height="4" fill="white" opacity="0.2" rx="2"/>
  <rect x="640" y="648" width="120" height="4" fill="white" opacity="0.2" rx="2"/>
  <rect x="800" y="648" width="120" height="4" fill="white" opacity="0.2" rx="2"/>
  <rect x="960" y="648" width="120" height="4" fill="white" opacity="0.2" rx="2"/>
  <rect x="1120" y="648" width="120" height="4" fill="white" opacity="0.2" rx="2"/>
  <rect x="1280" y="648" width="120" height="4" fill="white" opacity="0.2" rx="2"/>
  <!-- Horizon glow -->
  <ellipse cx="700" cy="580" rx="500" ry="40" fill="#e85d04" opacity="0.12"/>
  <!-- FUEL TRUCK -->
  <!-- Truck cab -->
  <rect x="650" y="470" width="180" height="130" rx="12" fill="url(#truckBody)"/>
  <!-- Windshield -->
  <rect x="660" y="478" width="120" height="70" rx="6" fill="#1a2a3a" opacity="0.85"/>
  <line x1="720" y1="478" x2="720" y2="548" stroke="#0a1520" stroke-width="2" opacity="0.5"/>
  <!-- Cab details -->
  <rect x="660" y="555" width="170" height="8" fill="#c44e02"/>
  <rect x="790" y="478" width="30" height="40" rx="4" fill="#c44e02"/>
  <!-- Door handle -->
  <rect x="700" y="530" width="30" height="6" rx="3" fill="#fff" opacity="0.3"/>
  <!-- Side mirror -->
  <rect x="640" y="490" width="15" height="20" rx="3" fill="#b84402"/>
  <!-- Headlights -->
  <ellipse cx="650" cy="510" rx="12" ry="18" fill="url(#headlight)" opacity="0.9" filter="url(#glow)"/>
  <!-- Headlight beam -->
  <polygon points="640,510 450,560 450,590 640,525" fill="#fff9c4" opacity="0.06"/>
  <!-- Exhaust -->
  <rect x="820" y="445" width="12" height="40" rx="4" fill="#555"/>
  <ellipse cx="826" cy="445" rx="8" ry="4" fill="#888" opacity="0.5"/>
  <!-- Smoke puffs -->
  <circle cx="826" cy="432" r="8" fill="#999" opacity="0.15"/>
  <circle cx="832" cy="418" r="10" fill="#888" opacity="0.1"/>
  <circle cx="820" cy="405" r="12" fill="#777" opacity="0.07"/>
  <!-- TANKER -->
  <ellipse cx="1060" cy="530" rx="260" ry="65" fill="url(#tanker)"/>
  <ellipse cx="800" cy="530" rx="15" ry="65" fill="#2c3e50"/>
  <ellipse cx="1320" cy="530" rx="15" ry="65" fill="#2c3e50"/>
  <!-- Tanker shine -->
  <ellipse cx="1060" cy="490" rx="200" ry="18" fill="white" opacity="0.07"/>
  <!-- Tanker bands -->
  <rect x="900" y="465" width="6" height="130" fill="#1a2a3a" opacity="0.5"/>
  <rect x="1000" y="465" width="6" height="130" fill="#1a2a3a" opacity="0.5"/>
  <rect x="1100" y="465" width="6" height="130" fill="#1a2a3a" opacity="0.5"/>
  <rect x="1200" y="465" width="6" height="130" fill="#1a2a3a" opacity="0.5"/>
  <!-- FUELFLOW logo on tanker -->
  <text x="990" y="538" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white" opacity="0.85" letter-spacing="3">FUELFLOW</text>
  <rect x="975" y="545" width="180" height="3" fill="#e85d04" rx="2"/>
  <!-- Wheels -->
  <circle cx="720" cy="600" r="38" fill="#1a1a1a"/>
  <circle cx="720" cy="600" r="28" fill="#2a2a2a"/>
  <circle cx="720" cy="600" r="10" fill="#555"/>
  <circle cx="880" cy="600" r="38" fill="#1a1a1a"/>
  <circle cx="880" cy="600" r="28" fill="#2a2a2a"/>
  <circle cx="880" cy="600" r="10" fill="#555"/>
  <circle cx="1050" cy="600" r="38" fill="#1a1a1a"/>
  <circle cx="1050" cy="600" r="28" fill="#2a2a2a"/>
  <circle cx="1050" cy="600" r="10" fill="#555"/>
  <circle cx="1240" cy="600" r="38" fill="#1a1a1a"/>
  <circle cx="1240" cy="600" r="28" fill="#2a2a2a"/>
  <circle cx="1240" cy="600" r="10" fill="#555"/>
  <!-- Wheel shine -->
  <circle cx="716" cy="596" r="8" fill="white" opacity="0.1"/>
  <circle cx="876" cy="596" r="8" fill="white" opacity="0.1"/>
  <!-- Orange accent stripe on truck -->
  <rect x="650" y="560" width="178" height="6" fill="#f4a926" opacity="0.8" rx="3"/>
  <!-- Dark overlay gradient -->
  <rect width="1400" height="800" fill="url(#sky)" opacity="0.45"/>
</svg>
